{% load static %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous"> 
<link rel="stylesheet" href="{% static 'Transportes/css/customize.css' %}">

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Document</title>
</head>
<body class="fondo">

    <h1 class="text-center">INICIAR SESIÓN</h1>

    <div class="container mt-4">
        <div class="card shadow p-4 tarjeta-2">
            <form method="post">{% csrf_token %}
                Usuario: <input type="text" name="username" id="user">
                Contraseña: <input type="password" name="password" id="password">
                <input type="submit" value="Iniciar Sesión" class="btn logout">
            </form>

            <a href="{% url 'nuevo_usuario' %}" class="btn btn-primary">Registrarse</a> 
        </div>
    </div>


</body>
</html>
