{% load static %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous"> 
<link rel="stylesheet" href="{% static 'Transportes/css/customize.css' %}">


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    <title>Inicio</title>
</head>
<body class="fondo">

    <div class="top">
        <div class="container">
            <div class="row">
                <div class="col-8">
                    <img src="{% static '/Transportes/img/logo_CT.png' %}" alt='' class="logo">
                </div>
                <div class="col-2">
                    <a href="{% url 'logout' %}" class="btn logout">Cerrar Sesion</a>
                </div>
                <div class="col-2">
                    <button onclick="history.back()" class="btn-volver">Volver Atrás</button>
                </div>
            </div>
        </div>
    </div>



    {% block section %}

        <h1>Inicio</h1>

    {% endblock section %}

<div class="botones-in">
    {% block article %}

        <div class="container">
            <div class="row justify-content-center">
                <div class="col-2">
                    <a href="{% url 'registro' %}">
                        <div class="card tarjeta">
                            <div class="card-body text-center">
                                <img width="100" height="100" src="{% static '/Transportes/img/registro.png' %}" alt="">
                                <p class="card-text">Registro</p>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="col-2">
                    <a href="{% url 'registrar_pasajero' %}">
                        <div class="card tarjeta">
                            <div class="card-body text-center">
                                <img width="100" height="100" src="{% static '/Transportes/img/agr_pasajero.png' %}" alt="">
                                <p class="card-text">Añadir Pasajero</p>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="col-2">
                    <a href="{% url 'ver_viajes' %}">
                        <div class="card tarjeta">
                            <div class="card-body text-center">
                                <img width="100" height="100" src="{% static '/Transportes/img/viajes.png' %}" alt="">
                                <p class="card-text">Ver Viajes</p>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="col-2">
                    <a href="{% url 'mis_boletos' %}">
                        <div class="card tarjeta">
                            <div class="card-body text-center">
                                <img width="100" height="100" src="{% static '/Transportes/img/boletos.png' %}" alt="">
                                <p class="card-text">Mis Boletos</p>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>

    {% endblock article %}
</div>

</body>
</html>
